[phases.setup]
nixPkgs = ["...", "nodejs-18_x", "npm-9_x"]

[phases.install]
cmds = [
    "cd frontend && npm ci && cd ..",
    "pip install -r requirements.txt",
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120"
